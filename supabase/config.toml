# supabase/config.toml
# Supabase local development configuration.
# See: https://supabase.com/docs/guides/local-development/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://www.bookhushly.com", "http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false

# The custom auth hook — points to our Edge Function
[auth.hook.send_email]
enabled = true
uri = "pg-functions://postgres/public/send_auth_email_hook"
# For edge function hooks use:
# uri = "https://<project-ref>.supabase.co/functions/v1/send-auth-email"

[functions.send-auth-email]
verify_jwt = false
